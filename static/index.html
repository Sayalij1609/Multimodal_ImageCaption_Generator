<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimodal Image Captioning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #6c63ff;
    --accent2: #00e5c0;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #00e5c0;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  /* Upload Zone */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #12122a;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .upload-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .upload-main { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text); }
  .upload-sub  { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Preview area */
  .preview-area {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .preview-area.visible { display: block; }

  .preview-image-wrap {
    position: relative;
    background: #000;
    max-height: 340px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-image-wrap img {
    width: 100%;
    max-height: 340px;
    object-fit: contain;
    display: block;
  }

  .change-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10,10,15,0.85);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }

  /* Prompt section */
  .prompt-section {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .prompt-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .prompt-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .prompt-input:focus { border-color: var(--accent); }
  .prompt-input::placeholder { color: var(--muted); }

  /* Generate button */
  .generate-btn {
    display: block;
    width: calc(100% - 48px);
    margin: 0 24px 24px;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .generate-btn .btn-spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  .generate-btn.loading .btn-spinner { display: inline-block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }

  /* Results */
  .results {
    display: none;
    margin-top: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .results.visible { display: block; }

  .results-header {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .caption-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    position: relative;
  }

  .caption-card:hover { border-color: #3a3a58; }

  .caption-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .caption-type .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  .caption-type .dot.purple { background: var(--accent); }
  .caption-type .dot.amber  { background: #f5a623; }
  .caption-type .dot.pink   { background: #ff6b9d; }

  .caption-text {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  .copy-caption {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .copy-caption:hover { color: var(--text); }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
    height: 16px;
    margin: 6px 0;
  }

  /* Upload again */
  .reset-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:hover { border-color: var(--text); color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">LLM Practical </div>
    <h1>Multimodal<br><span>Image Captioning</span></h1>
    <p class="subtitle">Upload any image.</p>
  </header>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-main">Drop image here or click to upload</div>
    <div class="upload-sub">Supports JPG, PNG, WEBP — max 16MB</div>
  </div>

  <!-- Preview + generate -->
  <div class="preview-area" id="previewArea">
    <div class="preview-image-wrap">
      <img id="previewImg" src="" alt="Preview">
      <button class="change-btn" onclick="resetAll()">Change image</button>
    </div>

    <div class="prompt-section">
      <span class="prompt-label">Custom prompt</span>
      <input class="prompt-input" id="customPrompt" type="text" placeholder="e.g. what is happening in this image?">
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateCaptions()">
      <span class="btn-spinner"></span>
      <span class="btn-text">Generate Captions</span>
    </button>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">Generated Captions</div>
    <div id="captionCards"></div>
    <button class="reset-btn" onclick="resetAll()">Upload another image</button>
  </div>

</div>

<script>
  let selectedFile = null;

  const uploadZone  = document.getElementById('uploadZone');
  const fileInput   = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const previewImg  = document.getElementById('previewImg');
  const generateBtn = document.getElementById('generateBtn');
  const results     = document.getElementById('results');
  const cards       = document.getElementById('captionCards');

  // Drag and drop
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      uploadZone.style.display = 'none';
      previewArea.classList.add('visible');
      results.classList.remove('visible');
      cards.innerHTML = '';
    };
    reader.readAsDataURL(file);
  }

  async function generateCaptions() {
    if (!selectedFile) return;
    const prompt = document.getElementById('customPrompt').value.trim();

    generateBtn.disabled = true;
    generateBtn.classList.add('loading');
    generateBtn.querySelector('.btn-text').textContent = 'Generating...';

    // Show skeletons
    results.classList.add('visible');
    cards.innerHTML = skeletonHTML();

    const formData = new FormData();
    formData.append('image', selectedFile);
    if (prompt) formData.append('prompt', prompt);

    try {
      const res  = await fetch('/caption', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.error) { showError(data.error); return; }

      const c = data.captions;
      const cardDefs = [
        { dot: "",       label: "One sentence caption",          text: c.plain  },
        { dot: 'purple', label: 'Detailed scene description',       text: c.detail  },
        { dot: 'amber',  label: 'Creative poetic caption',           text: c.creative },
      ];
      if (c.custom) cardDefs.push({ dot: 'pink', label: `Custom: "${prompt}"`, text: c.custom });

      cards.innerHTML = cardDefs.map(d => `
        <div class="caption-card">
          <div class="caption-type">
            <span class="dot ${d.dot}"></span>${d.label}
          </div>
          <div class="caption-text">${d.text}</div>
          <button class="copy-caption" onclick="copyText(this, '${d.text.replace(/'/g,"\\'")}')">copy</button>
        </div>`).join('');

    } catch(err) {
      showError('Could not connect to server. Make sure app.py is running.');
    } finally {
      generateBtn.disabled = false;
      generateBtn.classList.remove('loading');
      generateBtn.querySelector('.btn-text').textContent = 'Generate Captions';
    }
  }

  function skeletonHTML() {
    return Array(3).fill(`
      <div class="caption-card">
        <div class="skeleton" style="width:40%;height:10px;margin-bottom:12px"></div>
        <div class="skeleton" style="width:90%"></div>
        <div class="skeleton" style="width:65%;margin-top:6px"></div>
      </div>`).join('');
  }

  function showError(msg) {
    cards.innerHTML = `<div class="caption-card"><div class="caption-text" style="color:#ff6b6b">${msg}</div></div>`;
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    });
  }

  function resetAll() {
    selectedFile = null;
    fileInput.value = '';
    previewArea.classList.remove('visible');
    uploadZone.style.display = '';
    results.classList.remove('visible');
    cards.innerHTML = '';
    document.getElementById('customPrompt').value = '';
  }
</script>
</body>
</html>
